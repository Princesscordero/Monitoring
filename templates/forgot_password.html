<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Energy Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
    <div class="login-shell login-shell-simple">
        <section class="login-card forgot-password-card">
            <div class="login-card-header">
                <p class="section-kicker">Account Help</p>
                <h2>Forgot your password?</h2>
                <p>
                    Password reset is handled by your system administrator. If Google sign-in is available,
                    you can also return to the login page and continue with Google.
                </p>
            </div>

            <div class="forgot-password-note">
                Use your approved admin account or contact the project administrator to reset your credentials.
            </div>

            <a href="{{ url_for('login') }}" class="login-google-btn forgot-password-back">
                Back to login
            </a>
        </section>
    </div>
</body>
</html>
