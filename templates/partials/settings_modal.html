<div id="settingsModal" class="settings-modal hidden">
  <div class="settings-panel">
    <h3>System Settings</h3>

    <div class="settings-section">
      <h4>Charging Rules</h4>

    <div class="settings-group">
      <label for="setLowBattery">Low Battery Cutoff (%)</label>
      <input type="number" id="setLowBattery" min="5" max="50" value="20">
    </div>

    <div class="settings-group">
      <label for="setMaxSession">Max Session (minutes)</label>
      <input type="number" id="setMaxSession" min="5" max="180" value="60">
    </div>

    <div class="settings-group">
      <label class="checkbox">
        <input type="checkbox" id="setAutoStart">
        Auto start when a device connects
      </label>
    </div>
    </div>

    <div class="settings-section">
      <h4>Data Source</h4>

      <div class="settings-group">
        <label class="checkbox">
          <input type="checkbox" id="setEnableEsp32">
          Enable ESP32 live data override
        </label>
      </div>

      <div class="settings-group">
        <label for="setEsp32Ttl">ESP32 timeout (seconds)</label>
        <input type="number" id="setEsp32Ttl" min="1" max="60" value="6">
      </div>
    </div>

    <div class="settings-section">
      <h4>Simulation Timing</h4>

      <div class="settings-group">
        <label for="setMetricsInterval">System metrics interval (seconds)</label>
        <input type="number" id="setMetricsInterval" min="1" max="30" value="5">
      </div>

      <div class="settings-group">
        <label for="setBatteryInterval">Battery interval (seconds)</label>
        <input type="number" id="setBatteryInterval" min="1" max="30" value="5">
      </div>

      <div class="settings-group">
        <label for="setPortInterval">Port electrical interval (seconds)</label>
        <input type="number" id="setPortInterval" min="1" max="20" value="2">
      </div>

      <div class="settings-group">
        <label for="setConnectionToggleInterval">Device toggle interval (seconds)</label>
        <input type="number" id="setConnectionToggleInterval" min="5" max="120" value="30">
      </div>
    </div>

    <div class="settings-section">
      <h4>Notifications</h4>

    <div class="settings-group">
      <label class="checkbox">
        <input type="checkbox" id="setAlertsEnabled">
        Enable alerts and notifications
      </label>
    </div>
    </div>

    <div class="settings-buttons">
      <button type="button" class="settings-btn close" id="closeSettingsBtn">Close</button>
      <button type="button" class="settings-btn" id="saveSettingsBtn">Save</button>
    </div>
  </div>
</div>
